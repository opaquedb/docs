site_name: OpaqueDB
site_description: Run SQL over encrypted data without revealing the query.
site_author: OpaqueDB
copyright: Apache-2.0

repo_url: https://github.com/opaquedb/opaquedb
repo_name: opaquedb/opaquedb

theme:
  name: material
  logo: assets/logo.svg
  favicon: assets/logo.svg
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: lime
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: lime
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - toc.follow
    - content.code.copy
    - search.suggest
    - search.highlight

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - How it works: how-it-works.md
  - Architecture: architecture.md
  - Building and development: building.md
  - Configuration: configuration.md
  - CLI reference: cli.md
  - Cluster: cluster.md
  - Security: security.md
